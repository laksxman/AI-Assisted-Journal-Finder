version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: journal-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: journal-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_password

volumes:
  mongo_data:

